# gbps.conf
# Lightweight GBP server configuration. ogracd client settings stay in ogracd.ini.

HOST=0.0.0.0
PORT=2611

ADMIN_HOST=127.0.0.1
ADMIN_PORT=2711

LOG_FILE=$OGDB_HOME/log/gbps/gbps.rlog
PID_FILE=$OGDB_HOME/run/gbps.pid

MAX_CACHE_PAGES=0
READ_END_MODE=async
READ_PHASE_TIMEOUT=300

VERBOSE=false
TIMING_DIAG=false

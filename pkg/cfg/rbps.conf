# rbps.conf
# Lightweight RBP server configuration. ogracd client settings stay in ogracd.ini.

HOST=0.0.0.0
PORT=2611

ADMIN_HOST=127.0.0.1
ADMIN_PORT=2711

LOG_FILE=$OGDB_HOME/../../log/rbps/rbps.log
PID_FILE=$OGDB_HOME/run/rbps.pid

MAX_CACHE_PAGES=3000000
# false: hard cap new cache pages at MAX_CACHE_PAGES; true: allow writes and evict by capacity in background.
CAPACITY_EVICT_ON_WRITE=false
READ_END_MODE=async
# Seconds before an orphan READ_PHASE is released automatically; 0 disables timeout release.
READ_PHASE_TIMEOUT=3

VERBOSE=false
TIMING_DIAG=false
